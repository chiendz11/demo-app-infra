name: terraform-apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/environments/production/**"
      - "terraform/modules/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-production
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: terraform/environments/production
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_root_domain: ${{ vars.ROOT_DOMAIN }}
  TF_VAR_app_subdomain: ${{ vars.APP_SUBDOMAIN || 'app' }}
  TF_VAR_instance_type: ${{ vars.INSTANCE_TYPE || 't3.micro' }}
  TF_VAR_github_oidc_provider_arn: ${{ vars.AWS_GITHUB_OIDC_PROVIDER_ARN }}

jobs:
  apply:
    name: Apply production
    runs-on: ubuntu-latest
    environment: infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: terraform-apply-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform

      - name: Initialize production backend
        run: terraform -chdir="$TF_WORKING_DIR" init -input=false

      - name: Validate production configuration
        run: terraform -chdir="$TF_WORKING_DIR" validate

      - name: Create reviewed apply plan
        run: |
          terraform -chdir="$TF_WORKING_DIR" plan \
            -input=false \
            -lock-timeout=5m \
            -out=tfplan

      - name: Apply production plan
        run: |
          terraform -chdir="$TF_WORKING_DIR" apply \
            -input=false \
            -lock-timeout=5m \
            tfplan

      - name: Write deployment summary
        run: |
          application_url="$(
            terraform -chdir="$TF_WORKING_DIR" output -raw application_url
          )"

          instance_id="$(
            terraform -chdir="$TF_WORKING_DIR" output -raw instance_id
          )"

          {
            echo "## Production infrastructure"
            echo ""
            echo "- Application: ${application_url}"
            echo "- EC2 instance: \`${instance_id}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Status: applied successfully"
          } >> "$GITHUB_STEP_SUMMARY"
